apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
spec:
  serviceName: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/instance: elasticsearch-ecc-instance
        app.kubernetes.io/version: 7.17.16
    spec:
      imagePullSecrets:
      - name: code-il2-pull-creds
      securityContext:
        fsGroup: 1337
        runAsUser: 1000
      containers:
      - name: elasticsearch
        image: registry1.dso.mil/ironbank/elastic/elasticsearch/elasticsearch:7.17.16
        env:
        - name: node.name
          value: "elasticsearch"
        - name: cluster.initial_master_nodes
          value: "elasticsearch"
        volumeMounts:
        - name: sts-pvc
          mountPath: /usr/share/elasticsearch/data
        resources:
          limits:
            memory: 512Mi
  volumeClaimTemplates:
  - metadata:
      name: sts-pvc
    spec:
      accessModes: 
      - "ReadWriteOnce"
      resources:
        requests:
          storage: 10Mi
