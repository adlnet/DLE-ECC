        - name: STYLE_SHA
          value: "sha256-5McjkcKBpv3V8kAi271IT9NOk1/ZJcd3XNlAyrOGaOw="
        - name: IMAGE_SHA
          value: "sha256-0EZqoz+oBhx7gF4nvY2bSqoGyy4zLjNF+SDQXGp/ZrY="
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: mysql-connect-info
              key: MYSQL_HOST
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_NAME_4
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_ADMIN_USER_4
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_ADMIN_PASSWORD_4
        - name: MYSQL_DB_NAME
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_NAME_4
        - name: MYSQL_DB_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_ADMIN_USER_4
        - name: MYSQL_DB_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_ADMIN_PASSWORD_4
        - name: MYSQL_DB_RW_USER
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_RW_USER_4
        - name: MYSQL_DB_RW_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_RW_PASSWORD_4
        - name: MYSQL_DB_RO_USER
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_RO_USER_4
        - name: MYSQL_DB_RO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-db-credentials
              key: MYSQL_DB_RO_PASSWORD_4
        - name: P1PS_BASE_URL
          valueFrom:
            secretKeyRef:
              name: p1ps-secrets
              key: P1PS_BASE_URL
        - name: P1PS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: p1ps-secrets
              key: P1PS_AUTH_TOKEN
        - name: P1PS_TEAM_ID
          valueFrom:
            secretKeyRef:
              name: p1ps-secrets
              key: P1PS_TEAM_ID
        - name: CELERY_BROKER_URL
          value: "redis://redis-xia-aetc:6379"
        - name: CELERY_RESULT_BACKEND
          value: "django-db"
        - name: CSRF_COOKIE_DOMAIN
          value: "https://ecc.staging.dso.mil"
      - name: redis
        image: registry1.dso.mil/ironbank/opensource/redis/redis7:7.4.6
      - name: xia-aetc-nginx
        image: nginx/nginx
        ports: 
          - containerPort: 8080
            name: aetc-nginx-port
        volumeMounts:
          - mountPath: "/usr/share/nginx/html"
            name: xia-aetc-storage-mount
          - mountPath: /etc/nginx/conf.d/
            name: nginx-default
      volumes:
        - name: xia-aetc-storage-mount
          persistentVolumeClaim:
            claimName: xia-aetc-storage-claim
        - name: nginx-default
          configMap:
            name: xia-aetc-nginx-default-config
