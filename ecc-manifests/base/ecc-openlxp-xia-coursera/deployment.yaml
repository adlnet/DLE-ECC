apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecc-openlxp-xia-coursera
spec:
  strategy:
    type: Recreate
  template:
    spec:
      securityContext:
        fsGroup: 1001
      terminationGracePeriodSeconds: 15
      imagePullSecrets:
        - name: code-il2-pull-creds
      containers:
        - name: ecc-openlxp-xia-coursera
          image: ecc/ecc-openlxp-xia-coursera
          volumeMounts:
            - mountPath: "/tmp/shared/"
              name: xia-coursera-storage-mount
          command:
            - "/bin/sh"
            - "-exc"
            - |
              sed -i 's/hashlib.md5()/hashlib.md5(usedforsecurity=False)/g' /tmp/app/.cache/python-packages/django/db/backends/utils.py
              ../start-app.sh
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: app-vars
            - secretRef:
                name: mysql-connect-info
            - secretRef:
                name: xia-coursera-secrets
            - configMapRef:
                name: cluster-prefix
            - secretRef:
                name: p1ps-secrets
          env:
            - name: LOG_PATH
              value: "/tmp/debug.log"
            - name: MEDIA_PATH
              value: "/tmp/shared/media"
            - name: FORCE_SCRIPT_NAME
              value: "/ecc-openlxp-xia-coursera"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: mysql-connect-info
                  key: MYSQL_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_NAME_9
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_ADMIN_USER_9
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_ADMIN_PASSWORD_9
            - name: MYSQL_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_NAME_9
            - name: MYSQL_DB_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_ADMIN_USER_9
            - name: MYSQL_DB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_ADMIN_PASSWORD_9
            - name: MYSQL_DB_RW_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_RW_USER_9
            - name: MYSQL_DB_RW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_RW_PASSWORD_9
            - name: MYSQL_DB_RO_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_RO_USER_9
            - name: MYSQL_DB_RO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-db-credentials
                  key: MYSQL_DB_RO_PASSWORD_9
            - name: P1PS_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: p1ps-secrets
                  key: P1PS_BASE_URL
            - name: P1PS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: p1ps-secrets
                  key: P1PS_AUTH_TOKEN
            - name: P1PS_TEAM_ID
              valueFrom:
                secretKeyRef:
                  name: p1ps-secrets
                  key: P1PS_TEAM_ID
            - name: CELERY_BROKER_URL
              value: "redis://redis-xia-coursera:6379"
            - name: CELERY_RESULT_BACKEND
              value: "django-db"
          resources:
            limits:
              memory: 8Gi
            requests:
              cpu: 100m
              memory: 1Gi
        - name: xia-coursera-celery-worker
          image: ecc/ecc-openlxp-xia-coursera
          volumeMounts:
            - mountPath: "/tmp/shared/"
              name: xia-coursera-storage-mount
          command: ["celery", "-A", "openlxp_xia_coursera_project", "worker", "-l", "info", "--pool=solo"]
          imagePullPolicy: Always
          envFrom:
          - configMapRef:
              name: app-vars
          - secretRef:
              name: mysql-connect-info
          - secretRef:
              name: xia-coursera-secrets
          - configMapRef:
              name: cluster-prefix
          - secretRef:
              name: p1ps-secrets
          env:
          - name: HOSTS
            value: "ecc.apps.dso.mil"
          - name: LOG_PATH
            value: "/tmp/debug.log"
          - name: MEDIA_PATH
            value: "/tmp/shared/media"
          - name: FORCE_SCRIPT_NAME
            value: "/ecc-openlxp-xia-coursera"
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: mysql-connect-info
                key: MYSQL_HOST
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_NAME_9
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_USER_9
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_PASSWORD_9
          - name: MYSQL_DB_NAME
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_NAME_9
          - name: MYSQL_DB_ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_USER_9
          - name: MYSQL_DB_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_PASSWORD_9
          - name: MYSQL_DB_RW_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RW_USER_9
          - name: MYSQL_DB_RW_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RW_PASSWORD_9
          - name: MYSQL_DB_RO_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RO_USER_9
          - name: MYSQL_DB_RO_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RO_PASSWORD_9
          - name: P1PS_BASE_URL
            valueFrom:
              secretKeyRef:
                name: p1ps-secrets
                key: P1PS_BASE_URL
          - name: P1PS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: p1ps-secrets
                key: P1PS_AUTH_TOKEN
          - name: P1PS_TEAM_ID
            valueFrom:
              secretKeyRef:
                name: p1ps-secrets
                key: P1PS_TEAM_ID
          - name: CELERY_BROKER_URL
            value: "redis://redis-xia-coursera:6379"
          - name: CELERY_RESULT_BACKEND
            value: "django-db"
          - name: STYLE_SHA
            value: "sha256-5McjkcKBpv3V8kAi271IT9NOk1/ZJcd3XNlAyrOGaOw="
          - name: IMAGE_SHA
            value: "sha256-0EZqoz+oBhx7gF4nvY2bSqoGyy4zLjNF+SDQXGp/ZrY="
          resources:
            limits:
              memory: 8Gi
            requests:
              memory: 1Gi
              cpu: 100m
        - name: xia-coursera-celery-beat
          image: ecc/ecc-openlxp-xia-coursera
          volumeMounts:
            - mountPath: "/tmp/shared/"
              name: xia-coursera-storage-mount
          command: ["celery", "-A", "openlxp_xia_coursera_project", "beat", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler" , "--loglevel=info", "--pidfile=/tmp/celerybeat.pid"]
          imagePullPolicy: Always
          envFrom:
          - configMapRef:
              name: app-vars
          - secretRef:
              name: mysql-connect-info
          - secretRef:
              name: xia-coursera-secrets
          - configMapRef:
              name: cluster-prefix
          - secretRef:
              name: p1ps-secrets
          env:
          - name: HOSTS
            value: "ecc.apps.dso.mil"
          - name: LOG_PATH
            value: "/tmp/debug.log"
          - name: MEDIA_PATH
            value: "/tmp/shared/media"
          - name: FORCE_SCRIPT_NAME
            value: "/ecc-openlxp-xia-coursera"
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: mysql-connect-info
                key: MYSQL_HOST
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_NAME_9
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_USER_9
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_PASSWORD_9
          - name: MYSQL_DB_NAME
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_NAME_9
          - name: MYSQL_DB_ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_USER_9
          - name: MYSQL_DB_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_ADMIN_PASSWORD_9
          - name: MYSQL_DB_RW_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RW_USER_9
          - name: MYSQL_DB_RW_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RW_PASSWORD_9
          - name: MYSQL_DB_RO_USER
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RO_USER_9
          - name: MYSQL_DB_RO_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-db-credentials
                key: MYSQL_DB_RO_PASSWORD_9
          - name: P1PS_BASE_URL
            valueFrom:
              secretKeyRef:
                name: p1ps-secrets
                key: P1PS_BASE_URL
          - name: P1PS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: p1ps-secrets
                key: P1PS_AUTH_TOKEN
          - name: P1PS_TEAM_ID
            valueFrom:
              secretKeyRef:
                name: p1ps-secrets
                key: P1PS_TEAM_ID
          - name: CELERY_BROKER_URL
            value: "redis://redis-xia-coursera:6379"
          - name: CELERY_RESULT_BACKEND
            value: "django-db"
          - name: STYLE_SHA
            value: "sha256-5McjkcKBpv3V8kAi271IT9NOk1/ZJcd3XNlAyrOGaOw="
          - name: IMAGE_SHA
            value: "sha256-0EZqoz+oBhx7gF4nvY2bSqoGyy4zLjNF+SDQXGp/ZrY="
        - name: redis
          image: registry1.dso.mil/ironbank/opensource/redis/redis7:7.4.6
        - name: xia-coursera-nginx
          image: nginx/nginx
          ports:
            - containerPort: 8080
              name: xia-nginx-port
          volumeMounts:
            - mountPath: "/usr/share/nginx/html"
              name: xia-coursera-storage-mount
            - mountPath: /etc/nginx/conf.d/
              name: nginx-default
      volumes:
        - name: xia-coursera-storage-mount
          persistentVolumeClaim:
            claimName: xia-coursera-storage-claim
        - name: nginx-default
          configMap:
            name: xia-coursera-nginx-default-config
